services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ramen-dojang-postgres
    environment:
      POSTGRES_DB: ramen_dojang
      POSTGRES_USER: ramen
      POSTGRES_PASSWORD: ramen
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ramen -d ramen_dojang"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

